name: Init Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  wrapper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Add SHA
        run: |
          cd gradle/wrapper
          sha256sum gradle-wrapper.jar | sed 's/^/distributionSha256Sum=/' >> gradle-wrapper.properties

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add gradle/wrapper gradlew gradlew.bat
          git commit -m "Init Gradle wrapper"
          git push
